# Vanillagreen theme pack manifest.
# Distributed as one VS Code extension contributing all themes + a matched icon theme,
# with per-theme Ghostty palette + ambient shaders.
name = "vanillagreen-themes"
kind = "theme-pack"
description = "Matched Ghostty + VS Code-family theme pack (25 color themes + Rosé Pine icons)."
default-theme = "ghibli-serene-nature"
targets = ["ghostty", "vscode", "vscodium", "cursor"]

[[themes]]
id = "anthropic"
display = "Anthropic"

[themes.ghostty]
theme-file = "ghostty/themes/anthropic.conf"
shaders = ["ghostty/shaders/anthropic-ambient.glsl"]
pulse-shader = "ghostty/shaders/anthropic-ambient-pulse.glsl"

[themes.vscode]
theme-name = "Anthropic"
theme-file = "vscode/themes/anthropic-color-theme.json"

